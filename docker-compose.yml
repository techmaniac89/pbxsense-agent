services:
  pbxsense-agent:
    build:
      context: .
    container_name: pbxsense-agent
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      PBXSENSE_PBX_TYPE: ${PBXSENSE_PBX_TYPE}
      PBXSENSE_AGENT_MODE: ${PBXSENSE_AGENT_MODE}
      PBXSENSE_DISPLAY_NAME: ${PBXSENSE_DISPLAY_NAME}
      PBXSENSE_AGENT_TOKEN: ${PBXSENSE_AGENT_TOKEN}
      PBXSENSE_CONNECT_TIMEOUT: ${PBXSENSE_CONNECT_TIMEOUT}
      PBXSENSE_TIMEZONE: ${PBXSENSE_TIMEZONE}
      ASTERISK_AMI_HOST: ${ASTERISK_AMI_HOST}
      ASTERISK_AMI_PORT: ${ASTERISK_AMI_PORT}
      ASTERISK_AMI_USERNAME: ${ASTERISK_AMI_USERNAME}
      ASTERISK_AMI_PASSWORD: ${ASTERISK_AMI_PASSWORD}
      ASTERISK_AMI_TIMEOUT: ${ASTERISK_AMI_TIMEOUT}
      GRANDSTREAM_UCM_AMI_HOST: ${GRANDSTREAM_UCM_AMI_HOST}
      GRANDSTREAM_UCM_AMI_PORT: ${GRANDSTREAM_UCM_AMI_PORT}
      GRANDSTREAM_UCM_AMI_USERNAME: ${GRANDSTREAM_UCM_AMI_USERNAME}
      GRANDSTREAM_UCM_AMI_PASSWORD: ${GRANDSTREAM_UCM_AMI_PASSWORD}
      GRANDSTREAM_UCM_AMI_TLS: ${GRANDSTREAM_UCM_AMI_TLS}
      GRANDSTREAM_UCM_AMI_VERIFY_TLS: ${GRANDSTREAM_UCM_AMI_VERIFY_TLS}
      GRANDSTREAM_UCM_AMI_TIMEOUT: ${GRANDSTREAM_UCM_AMI_TIMEOUT}
      GRANDSTREAM_UCM_CDR_CSV_PATH: ${GRANDSTREAM_UCM_CDR_CSV_PATH}
      GRANDSTREAM_UCM_VOICEMAIL_PATH: ${GRANDSTREAM_UCM_VOICEMAIL_PATH}
      GRANDSTREAM_UCM_RECORDINGS_PATH: ${GRANDSTREAM_UCM_RECORDINGS_PATH}
      GRANDSTREAM_UCM_SECURITY_LOG_PATH: ${GRANDSTREAM_UCM_SECURITY_LOG_PATH}
      ASTERISK_CDR_CSV_PATH: ${ASTERISK_CDR_CSV_PATH}
      ASTERISK_VOICEMAIL_PATH: ${ASTERISK_VOICEMAIL_PATH}
      ASTERISK_SECURITY_LOG_PATH: ${ASTERISK_SECURITY_LOG_PATH}
      FREESWITCH_ESL_HOST: ${FREESWITCH_ESL_HOST}
      FREESWITCH_ESL_PORT: ${FREESWITCH_ESL_PORT}
      FREESWITCH_ESL_PASSWORD: ${FREESWITCH_ESL_PASSWORD}
      FREESWITCH_CDR_JSON_PATH: ${FREESWITCH_CDR_JSON_PATH}
      FREESWITCH_VOICEMAIL_PATH: ${FREESWITCH_VOICEMAIL_PATH}
      FREESWITCH_RECORDINGS_PATH: ${FREESWITCH_RECORDINGS_PATH}
      YEASTAR_BASE_URL: ${YEASTAR_BASE_URL}
      YEASTAR_CLIENT_ID: ${YEASTAR_CLIENT_ID}
      YEASTAR_CLIENT_SECRET: ${YEASTAR_CLIENT_SECRET}
      YEASTAR_API_VERSION: ${YEASTAR_API_VERSION}
      YEASTAR_VERIFY_TLS: ${YEASTAR_VERIFY_TLS}
      #PBXSENSE_EXTENSION_NAMES: ${PBXSENSE_EXTENSION_NAMES}
    volumes:
      - pbxsense-agent-data:/var/lib/pbxsense-agent
      - pbxsense-agent-logs:/var/log/pbxsense-agent
      - ${ASTERISK_LOGS_HOST_PATH:-../asterisk/logs}:/var/log/asterisk:ro
      - ${ASTERISK_SPOOL_HOST_PATH:-../asterisk/spool}:/var/spool/asterisk:ro
      - /etc/localtime:/etc/localtime:ro

volumes:
  pbxsense-agent-data:
  pbxsense-agent-logs:
