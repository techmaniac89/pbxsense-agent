# Asterisk-family example for a parent Compose project. Other connectors should
# start from docker/docker-compose.yml and add only their matching override.
name: pbxsense-agent

services:
  pbxsense-agent:
    build:
      context: ./pbxsense-agent
    container_name: pbxsense-agent
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./pbxsense-agent/.env
    volumes:
      - pbxsense-agent-data:/var/lib/pbxsense-agent
      - pbxsense-agent-logs:/var/log/pbxsense-agent
      - ./asterisk/logs:/var/log/asterisk:ro
      - ./asterisk/spool:/var/spool/asterisk:ro
      - /etc/localtime:/etc/localtime:ro

volumes:
  pbxsense-agent-data:
  pbxsense-agent-logs:
