name: pbxsense-agent

services:
  pbxsense-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pbxsense-agent
    restart: unless-stopped
    network_mode: host
    env_file:
      - ../.env
    volumes:
      - pbxsense-agent-data:/var/lib/pbxsense-agent
      - pbxsense-agent-logs:/var/log/pbxsense-agent
      - /etc/localtime:/etc/localtime:ro

volumes:
  pbxsense-agent-data:
  pbxsense-agent-logs:
